<html>
  <head>
    <title> Realidade aumentada usando imagem do A-frame e o marcador Hiro</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <body style="margin 0px; overflow: hiden">
      <a-scene vr-mode-ui="enabled: false" embeldded arjs="debugUIEnabled: false">
        <a-marker preset="hiro">
          <a-image scr="gway.jpeg" position="0 0 0" rotation="-90 0 0 " width="1" heigth="1.3"></a-image>
        </a-marker>
        <a-entity camera></a-entity>
      </a-scene>
    </body>
  </head>
</html>
